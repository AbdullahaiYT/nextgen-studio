// ── UI HELPERS ───────────────────────────────
const chat = document.getElementById('chat');
function scrollDown(){chat.scrollTop=chat.scrollHeight}

function addMsg(html, who){
  const wrap=document.createElement('div'); wrap.className=`msg ${who}`;
  const av=document.createElement('div'); av.className='avatar'; av.textContent=who==='bot'?'⚡':'👤';
  const b=document.createElement('div'); b.className='bubble'; b.innerHTML=fmt(html);
  wrap.appendChild(av); wrap.appendChild(b); chat.appendChild(wrap); scrollDown();
  return b;
}

function fmt(t){
  return t
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/<b>(.*?)<\/b>/g,'<strong>$1</strong>')
    .replace(/\n/g,'<br>');
}

function showTyping(){
  const wrap=document.createElement('div'); wrap.className='msg bot'; wrap.id='typ';
  const av=document.createElement('div'); av.className='avatar'; av.textContent='⚡';
  const t=document.createElement('div'); t.className='typing';
  t.innerHTML='<span></span><span></span><span></span>';
  wrap.appendChild(av); wrap.appendChild(t); chat.appendChild(wrap); scrollDown();
}
function hideTyping(){const e=document.getElementById('typ');if(e)e.remove();}
function respond(fn,d=700){showTyping();setTimeout(()=>{hideTyping();fn();},d);}

// ── RENDER SERVICE GRID ───────────────────────
function showGrid(){
  const l=curLang;
  const lbl=l==='hi'?'नीचे से कोई सेवा चुनें 👇':'Choose a service to explore 👇';
  const bubble=addMsg(lbl,'bot');
  const grid=document.createElement('div'); grid.className='service-grid';
  services.forEach(svc=>{
    const btn=document.createElement('button'); btn.className='svc-btn';
    btn.innerHTML=`${svc.icon} ${svc.name[l]}<br><small style="color:var(--muted);font-size:10px">${svc.short[l]}</small>`;
    btn.onclick=()=>{
      addMsg(`${svc.icon} ${svc.name[l]}`,'user');
      respond(()=>showDetail(svc),500);
    };
    grid.appendChild(btn);
  });
  bubble.appendChild(grid); scrollDown();
}

// ── RENDER SERVICE DETAIL ─────────────────────
function showDetail(svc){
  const l=curLang;
  const bubble=addMsg(`<strong>${svc.icon} ${svc.name[l]}</strong>`,'bot');

  // Details
  const det=document.createElement('div'); det.className='detail-card';
  det.innerHTML=fmt(svc.detail[l]); bubble.appendChild(det);

  // Pricing
  const pc=document.createElement('div'); pc.className='price-card';
  const ph=document.createElement('div'); ph.className='price-header';
  ph.innerHTML=(l==='hi'?'💰 कीमतें':'💰 Pricing')+'&nbsp;<span class="badge">40% OFF — 1st Service!</span>';
  pc.appendChild(ph);

  svc.packages.forEach(pkg=>{
    const row=document.createElement('div'); row.className='price-row';
    const nm=document.createElement('span'); nm.textContent=pkg.name[l]; row.appendChild(nm);
    const right=document.createElement('div'); right.style.textAlign='right';

    if(pkg.note==="FREE 🎁"){
      const pv=document.createElement('div'); pv.className='price-val'; pv.textContent='FREE 🎁';
      right.appendChild(pv);
    } else {
      const old=document.createElement('div'); old.className='price-old'; old.textContent=pkg.note;
      right.appendChild(old);
      const pv=document.createElement('div'); pv.className='price-val'; pv.textContent=applyDiscount(pkg.note);
      right.appendChild(pv);
    }
    row.appendChild(right); pc.appendChild(row);
  });
  bubble.appendChild(pc);

  // Buttons
  const ar=document.createElement('div'); ar.className='action-row';

  const bb=document.createElement('button'); bb.className='book-btn';
  bb.innerHTML=l==='hi'?'📩 Telegram पर बुक करें':'📩 Book via Telegram';
  bb.onclick=()=>{
    addMsg(bb.textContent.trim(),'user');
    sendTelegram(svc.name[l]);
    respond(()=>addMsg(
      l==='hi'
        ?'✅ Request भेज दी गई! हमारी team जल्द Telegram पर संपर्क करेगी। 🙌'
        :'✅ Request sent! Our team will contact you on Telegram shortly. 🙌',
      'bot'
    ),600);
  };
  ar.appendChild(bb);

  const bk=document.createElement('button'); bk.className='back-btn';
  bk.textContent=l==='hi'?'← सेवाओं पर वापस':'← Back to Services';
  bk.onclick=()=>{addMsg(bk.textContent.trim(),'user');respond(()=>showGrid(),400);};
  ar.appendChild(bk);

  bubble.appendChild(ar); scrollDown();
}

function applyDiscount(price){
  return price.replace(/₹([\d,]+)/g,(m,n)=>{
    const num=parseInt(n.replace(/,/g,''));
    const d=Math.round(num*0.6);
    return '₹'+d.toLocaleString('en-IN');
  });
}

// ── TELEGRAM ─────────────────────────────────
function sendTelegram(serviceName){
  if(TELEGRAM_BOT_TOKEN==="YOUR_BOT_TOKEN") return;
  fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`,{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      chat_id:TELEGRAM_CHAT_ID,
      text:`🔔 *New Lead — NextGen Studio*\n\n📌 Service: ${serviceName}\n⏰ ${new Date().toLocaleString('en-IN',{timeZone:'Asia/Kolkata'})}\n\n_Reply fast to close!_`,
      parse_mode:'Markdown'
    })
  }).catch(()=>{});
}

const greetWords=['hi','hello','hii','hey','namaste','salam','kya ho','service','bata','batao','help','show','list','sab','bolo','dekhna','chahiye','start','begin','क्या','बताओ','सेवा','शुरू'];
const priceWords=['price','pricing','cost','kitna','rate','charge','fees','daam','rupee','₹','कितना','कीमत','दाम'];

function handleSend(){
  const inp=document.getElementById('userInput');
  const raw=inp.value.trim(); if(!raw) return;
  addMsg(raw,'user'); inp.value=''; inp.style.height='auto';
  curLang=detectLang(raw);
  const lower=raw.toLowerCase();

  // Match service by name or id
  const matched=services.find(s=>
    lower.includes(s.id)||
    lower.includes(s.id.replace('-',''))||
    s.name.en.toLowerCase().split(' ').some(w=>w.length>3&&lower.includes(w))||
    s.name.hi.length>2&&lower.includes(s.name.hi.slice(0,4))||
    (s.short.en.toLowerCase().split(/[\/,]/)).some(w=>w.trim().length>3&&lower.includes(w.trim()))
  );

  if(matched){ respond(()=>showDetail(matched),500); return; }

  if(greetWords.some(w=>lower.includes(w))||lower.length<=6){
    respond(()=>{
      addMsg(curLang==='hi'
        ?'नमस्ते! 👋 **NextGen Studio** में आपका स्वागत है। कोई भी service चुनें, details और price बताऊंगा।'
        :`Hey! 👋 Welcome to **NextGen Studio**. Pick any service and I'll share full details & pricing.`,'bot');
      setTimeout(()=>showGrid(),300);
    }); return;
  }

  if(priceWords.some(w=>lower.includes(w))){
    respond(()=>{
      addMsg(curLang==='hi'
        ?'किसी भी service का price देखने के लिए उसे नीचे से चुनें 👇'
        :'Select any service below to see pricing 👇','bot');
      setTimeout(()=>showGrid(),300);
    }); return;
  }

  respond(()=>{
    addMsg(curLang==='hi'
      ?'सॉरी 😊 मुझे सिर्फ NextGen Studio की services के बारे में जानकारी देने के लिए बनाया गया है। कोई भी service चुनें, पूरी details बताऊंगा! 👇'
      :`Sorry 😊 I'm built only to help with NextGen Studio's services. Pick any service below for full details & pricing! 👇`,'bot');
    setTimeout(()=>showGrid(),400);
  });
}

document.getElementById('userInput').addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();handleSend();}
});
document.getElementById('userInput').addEventListener('input',function(){
  this.style.height='auto';this.style.height=Math.min(this.scrollHeight,100)+'px';
});

// ── INIT ──────────────────────────────────────
window.addEventListener('load',()=>{
  const chip=document.createElement('div'); chip.className='welcome-chip';
  chip.textContent='NextGen Studio — AI Assistant'; chat.appendChild(chip);
  setTimeout(()=>{
    showTyping();
    setTimeout(()=>{
      hideTyping();
      addMsg(`नमस्ते / Hello! 👋\n\nमैं **NextGen Studio** का AI assistant हूँ।\nHindi या English — जैसे चाहें बात करें! 😊`,'bot');
      setTimeout(()=>showGrid(),400);
    },900);
  },400);
});
</script>
